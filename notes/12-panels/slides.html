name: panel_intro

## Introduction

Until now, we mostly used one of two data structures:

--

1. .hi-orange[Cross section:] many units, one period,
--

2. .hi-purple[Time series:] one unit, many periods.

--

A .hi[panel] gives us both:

- .orange[units] indexed by `\(\color{#FFA500}{i}\)`,
- .purple[(time) periods] indexed by `\(\color{#6A5ACD}{t}\)`,
- outcomes and regressors like `\(\color{#e64173}{y_{\color{#FFA500}{i}\color{#6A5ACD}{t}}}\)` and `\(\color{#e64173}{x_{\color{#FFA500}{i}\color{#6A5ACD}{t}}}\)`.

---
## Example

Consider the following panel of six observations:

.pull-left[

```
#&gt;      Unit  Year  y_it  x_it
#&gt;    &lt;char&gt; &lt;num&gt; &lt;num&gt; &lt;num&gt;
#&gt; 1:      A     1    10     2
#&gt; 2:      A     2    11     3
#&gt; 3:      A     3    13     4
#&gt; 4:      B     1     7     1
#&gt; 5:      B     2     8     1
#&gt; 6:      B     3     9     2
```
]

---
## Example

Consider the following panel of six observations:

.pull-left[

```
#&gt;      Unit  Year  y_it  x_it
#&gt;    &lt;char&gt; &lt;num&gt; &lt;num&gt; &lt;num&gt;
*#&gt; 1:      A     1    10     2
*#&gt; 2:      A     2    11     3
*#&gt; 3:      A     3    13     4
#&gt; 4:      B     1     7     1
#&gt; 5:      B     2     8     1
#&gt; 6:      B     3     9     2
```
]
.pull-right[
We observe the .orange[same unit] repeatedly.
]

We can compare unit A to itself .hi-purple[over time], not just A to B&lt;br&gt;(potentially helping with *selection bias*).

---
## Example

Consider the following panel of six observations:

.pull-left[

```
#&gt;      Unit  Year  y_it  x_it
#&gt;    &lt;char&gt; &lt;num&gt; &lt;num&gt; &lt;num&gt;
*#&gt; 1:      A     1    10     2
#&gt; 2:      A     2    11     3
#&gt; 3:      A     3    13     4
*#&gt; 4:      B     1     7     1
#&gt; 5:      B     2     8     1
#&gt; 6:      B     3     9     2
```
]
.pull-right[
Similarly, we observe the .purple[period] across .orange[units].
]

This feature lets us control for shocks shared across .orange[units] at a given .purple[time].

---

## The benefits of panels

Panels help solve (some) econometric problems because they allow us to

--

- control for .b.orange[time-invariant differences] across units&lt;br&gt;.grey-light.it[removes selection bias from cross-sectional differences across units]
  
--

- implicitly study .b.purple[changes]&lt;br&gt;.grey-light.it[not just levels]

--

- .note[related:] evaluate policies using their .b.purple[timing]&lt;br&gt;.grey-light.it[policy-timing is often more plausibly exogeneous than policy existence]

--

Panel methods are workhorses of economics and public policy.

---

## Panels are helpful—not magical

Panel data *can* be helpful for estimating causal effects,
&lt;br&gt;but they can still cause problems without careful use.

--

- We need (sufficient) .it.orange[within variation] in `\(\color{#FFA500}{x_{it}}\)`.&lt;br&gt;.it[I.e.,] `\(x_{it}\)` must change meaningfully through time for some units.

- .purple[Time-varying] omitted variables can cause bias.

- A .orange[unit]'s disturbances `\(u_{\color{#FFA500}{i}\color{#6A5ACD}{t}}\)` are often correlated over .purple[time].

- Attrition and missing periods can matter—as can measurement error.

.grey-light.it[(Any tool can be misused.)]

name: pooled_problem
## The problem with pooled OLS

Suppose you're interested in a simple linear regression model
`$$y_{it} = \beta_0 + \color{#e64173}{\beta_1} x_{it} + u_{it}$$`
and have .b.slate[panel data] (with individual `\(i\)` and time `\(t\)`).

--

Let the disturbance combine (1) .orange[unit]-specific factor `\(\color{#FFA500}{\alpha_i}\)` and (2) error `\(\color{#2b59c3}{v_{it}}\)`
$$
`\begin{align}
  u_{it} = \color{#FFA500}{\alpha_i} + \color{#2b59c3}{v_{it}}
\end{align}`
$$

--

If `\(\mathop{\text{Cov}}\left( x_{it}, \color{#FFA500}{\alpha_i} \right) \neq 0\)`, then OLS may be biased. .grey-vlight.it[(Think OVB.)]

--

.attn[Standard OLS estimates] of `\(\color{#e64173}{\beta_1}\)` (*i.e.*, without FEs) will reflect both

- .it[between-unit differences] `\(\color{#FFA500}{\alpha_i}\)`,
- .it[actual changes] in `\(x_{it}\)`. .note[(We want to isolate this last part.)]
  
---

## Introducing *fixed effects*

.note[The solution:] Let each .orange[unit] have its own intercept `\(\color{#FFA500}{\alpha_i}\)`,&lt;br&gt; and each .purple[time period] have its own intercept `\(\color{#6A5ACD}{\lambda_t}\)`:
`$$y_{it} = \beta_1 x_{it} + \color{#FFA500}{\alpha_i} + \color{#6A5ACD}{\lambda_t} + u_{it}$$`

These .orange[unit]- and .purple[period]-specific intercepts are called .attn[fixed effects].

--


```
#&gt;      Unit  Year  y_it  x_it Unit_A Unit_B Year_1 Year_2 Year_3
#&gt;    &lt;char&gt; &lt;num&gt; &lt;num&gt; &lt;num&gt;  &lt;num&gt;  &lt;num&gt;  &lt;num&gt;  &lt;num&gt;  &lt;num&gt;
#&gt; 1:      A     1    10     2      1      0      1      0      0
#&gt; 2:      A     2    11     3      1      0      0      1      0
#&gt; 3:      A     3    13     4      1      0      0      0      1
#&gt; 4:      B     1     7     1      0      1      1      0      0
#&gt; 5:      B     2     8     1      0      1      0      1      0
#&gt; 6:      B     3     9     2      0      1      0      0      1
```

---
## Fixed effects in action

.qa[Q] So what are these fixed effects (FE) doing?

--

Remember the old interpretation of coefficients on binary variables?

--

.qa[A] These fixed effects *absorb*

- `\(\color{#FFA500}{\alpha_i}\)`: all time-invariant .orange[differences across units],&lt;br&gt;.grey-light.it[(including selection bias from cross-sectional differences)]

- `\(\color{#6A5ACD}{\lambda_t}\)`: all common shocks at a given .purple[time].

--

The .attn[(two-way) fixed-effects estimator] (OLS that includes unit and time FEs)
&lt;br&gt;estimates effects using .pink.it[within-unit variation]—net of common time shocks.

---

## The *within* transformation

For intuition, focus on unit-level fixed effects.
`$$y_{it} = \beta_0 + \beta_1 x_{it} + \alpha_i + u_{it}$$`

--

Take the average of this equation for unit `\(i\)` across all periods...
`$$\overline{y}_i = \beta_0 + \beta_1 \overline{x}_i + \alpha_i + \overline{u}_i$$`

--

Finally, subtract the unit mean from both sides of the original equation.
&lt;br&gt;(This step is what our unit-level fixed effects are doing.)
`$$y_{it} - \overline{y}_i = \beta_1 \left( x_{it} - \overline{x}_i \right) + \left( u_{it} - \overline{u}_i \right)$$`

--

.hi[So what?] Unit-specific FEs identify `\(\beta_1\)` using .attn[within-unit variation] in `\(x_{it}\)`.
&lt;br&gt;.grey-vlight.it[(The same logic applies to time FEs.)]

---
## Fixed-effects questions

Fixed effects .b[do not] ask questions like
&lt;br&gt;.white[FE] .note[Why is unit A different from unit B?]
&lt;br&gt;.grey-light.it.slab[In fact, they try to absorb cross-unit differences.]

--

Fixed effects also .b[do not] ask questions like
&lt;br&gt;.white[FE] .note[When period 1 had a shock, how did all units' outcomes change?]
&lt;br&gt;.grey-light.it.slab[They try to absorb common (shared) time shocks.]

--

Fixed effects .b[do] ask questions like
&lt;br&gt;.white[FE] .note[When unit A changed its value of] `\(x_{it}\)`, .note[how did its] `\(y_{it}\)` .note[change?]
&lt;br&gt;.grey-light.it.slab[This is the "within" variation.]

---
## Example: State minimum wage laws

Suppose we want to estimate the effect of min. wage laws on employment
`$$\text{Employment}_{it} = \beta_1 \text{(Min. Wage)}_{it} + \alpha_i + \lambda_t + u_{it}$$`
with a .orange[state] (`\(\color{#FFA500}{i}\)`) by .purple[year] (`\(\color{#6A5ACD}{t}\)`) panel of employment and min. wage data.

--

- `\(\alpha_i\)` absorbs time-invariant, cross-state differences;
- `\(\lambda_t\)` absorbs national shocks in year `\(t\)`.

--

.qa[Q] Should we worry that some states have higher min. wage than others?
--
&lt;br&gt;.qa[A] No. `\(\alpha_i\)` absorbs those differences. The FE estimator estimates using within-state variation in min. wage.

---
## Example: State minimum wage laws

Suppose we want to estimate the effect of min. wage laws on employment
`$$\text{Employment}_{it} = \beta_1 \text{(Min. Wage)}_{it} + \alpha_i + \lambda_t + u_{it}$$`
with a .orange[state] (`\(\color{#FFA500}{i}\)`) by .purple[year] (`\(\color{#6A5ACD}{t}\)`) panel of employment and min. wage data.

- `\(\alpha_i\)` absorbs time-invariant, cross-state differences;
- `\(\lambda_t\)` absorbs national shocks in year `\(t\)`.


.qa[Q] What if some *years* have lower emp. than others (recessions)?
--
&lt;br&gt;.qa[A] Still not worried! `\(\lambda_t\)` absorbs *shared* shocks.

---
## Example: State minimum wage laws

Suppose we want to estimate the effect of min. wage laws on employment
`$$\text{Employment}_{it} = \beta_1 \text{(Min. Wage)}_{it} + \alpha_i + \lambda_t + u_{it}$$`
with a .orange[state] (`\(\color{#FFA500}{i}\)`) by .purple[year] (`\(\color{#6A5ACD}{t}\)`) panel of employment and min. wage data.

- `\(\alpha_i\)` absorbs time-invariant, cross-state differences;
- `\(\lambda_t\)` absorbs national shocks in year `\(t\)`.


.qa[Q] So what should we worry about?
--
&lt;br&gt;.qa[A] We should worry about .attn[time-varying differences between states].

*E.g.*, if some states have faster-growing economies and also raise their minimum wages.

---

## What FE means in that example

In the minimum-wage panel, fixed effects (FEs) net out factors like

- state geography,
- long-run industry mix,
- baseline labor-market conditions,
- permanent political differences.

--

`$$\text{Employment}_{it} = \color{#e64173}{\beta_1} \text{(Min. Wage)}_{it} + \alpha_i + \lambda_t + u_{it}$$`

With FEs, `\(\color{#e64173}{\hat{\beta}_1}\)` comes from .b.pink[states that change their minimum wage], relative to their own histories and common national trends.

# Panel estimation
## `fixest` syntax

Now you know the intution, logic, and mechanics of fixed effects.

You also now understand the `fix` part of the `fixest` package.

To specify FEs: use `lm` syntax along with `|` followed by the FEs.


``` r
feols(
* teen_emp ~ min_wage | state + year, 
  cluster = ~ state,
  data = mw_df
)
```
Here we have fixed effects for .orange[state] and .purple[year].

# Panel estimation
## Summary

Fixed effects help one key problem: .hi[time-invariant omitted variables].

--

But FEs .b.slate[do not] solve *all* causal problems, *e.g.*,

- time-varying confounders,
- reverse causality
- measurement error,
- poor measurement of treatment timing,
- weak within variation.
  
As with *all* econometric tools, careful use is required.

# Difference-in-differences

---
class: inverse, middle

---
name: did_intuition

## Core idea

.attn[Difference-in-differences] (DiD).super.pink[†] is a popular panel-data approach for estimating causal effects of policies/events.

.footnote[.pink[†] Also called .it[double-differences] or .it[diff-in-diff]. Increasingly combined with .it[two-way fixed effects (TWFE)].]

DiD compares observations across two dimensions:

1. .b.purple[Group:] comparing
  - .purple.it[treated] individuals (potentially affected by the policy)
  - .purple.it[control] individuals (unaffected by the policy)
2. .b.orange[Time:] comparing
  - .orange.it[before] the policy takes effect .grey-vlight.it[(pre-treatment)]
  - .orange.it[after] the policy takes effect .grey-vlight.it[(post-treatment)]

---
## Intuition

DiD functions by taking the difference between two differences:

--

1. Δ.b[Y̅.sub.orange.tran50[Pre]] `\(=\)` .b[Y̅](.purple[Trt]; .orange.tran50[Pre]) `\(-\)` .b[Y̅](.purple.tran50[Ctrl]; .orange.tran50[Pre]) &lt;br&gt; the average difference between .purple[trt.] and .purple.tran50[control] .b.orange.tran50[before] the policy, &lt;br&gt; accounting for pre-existing differences between the groups;

--

2. Δ.b[Y̅.sub.orange[Post]] `\(=\)` .b[Y̅](.purple[Trt]; .orange[Post]) `\(-\)` .b[Y̅](.purple.tran50[Ctrl]; .orange[Post]) &lt;br&gt; the average difference between .purple[trt.] and .purple.tran50[control] .b.orange[after] the policy, &lt;br&gt; which includes pre-existing differences *and* the .pink[treatment effect].

--

The .attn[DiD estimate] is the difference between these differences
&lt;br&gt;
   .pink[τ̂] `\(=\)` Δ.b[Y̅.sub.orange[Post]] `\(-\)` Δ.b[Y̅.sub.orange.tran50[Pre]]
&lt;br&gt;
.note[I.e.,] how much did the .purple[trt]-.purple.tran50[control] difference change from .orange.tran50[pre] to .orange[post]?

# Difference-in-differences

---
## Classic example: Card and Krueger (1994)

One famous DiD [application](https://davidcard.berkeley.edu/papers/njmin-aer.pdf) estimates the .b.slate[impact of increasing the minimum wage on fast-food employment].

- .note[Who:] .purple[New Jersey (trt)] *vs.* .purple.tran50[Pennsylvania (ctrl)]
- .note[When:] .orange.tran50[before 01 April 1992 (pre)] *vs.* .orange[after 01 April 1992 (post)]

DiD estimates .grey-vlight.it[(both questions = same answer)]

1. How did NJ-PA empl. diff. change after the policy, relative to before?
2. How did NJ's empl. change after the policy relative to PA's change?

--

.note[Key assumption:] PA needs to be a good counterfactual for NJ. In the absence of the policy, NJ and PA would have followed the same empl. trends.

---

## DiD as a regression

With two groups and two periods
`$$y_{it} = \beta_0 + \beta_1 \color{#6A5ACD}{\text{Trt}_i} + \beta_2 \color{#FFA500}{\text{Post}_t} + \delta \left( \color{#6A5ACD}{\text{Trt}_i} \times \color{#FFA500}{\text{Post}_t} \right) + u_{it}$$`
where `\(\color{#6A5ACD}{\text{Trt}_i}\)` and `\(\color{#FFA500}{\text{Post}_t}\)` are binary indicators for the .purple[treated group] and .orange[post-treatment period]. 

The interaction asks if if the .orange[post] change in the .purple[treated group] differs from the .orange[post] change in the .purple.tran50[control group]: the .attn[treatment effect].

--

With panel data, we often write

`$$y_{it} = \alpha_i + \lambda_t + \delta D_{it} + u_{it}$$`

where `\(D_{it}=1\)` only for treated units after treatment starts.

# Difference-in-differences

---
## The key DiD assumption

DiD relies upon a critical assumption often called .attn[parallel trends]:

&gt; In the absence of treatment, treated and control units would have followed the .pink[same average trend].

Again, we're assuming that the trend of the control units provide &lt;br&gt; a .b.slate[good counterfactual] for the treated group.

---
## What threatens DiD?

So what violates this .note[parallel trends] assumption?

--

- treated units were already on a different trend,
- anticipation changes behavior before treatment,
- other shocks hit treated units at the same time as treatment.

--

What else can *mess up* DiD estimates?

- standard errors ignore within-unit dependence,
- measurement error,
- spillovers from trt to control,
- dynamic treatment effects,
- het trt effects *and* het trt timing...

---

## DiD's place in the toolbox

DiD is especially useful when

- treatment .orange[timing] is clear,
- .purple[treatment definition] is clear,
- you have good .orange[pre-treatment] data
- .purple.tran50[ctrl group] provide a plausible counterfactual for .purple[trt group],
- the .pink[treatment effect] is tied to a discrete policy or event.
  
--

.qa[Q] What are the other options?
--
&lt;br&gt;
.qa[A] Synthetic control and friends—build a weighted average of control units to better match the treated unit's pre-treatment path.

---
## Takeaways

Key concepts from panel estimation, FEs, and DiD:

- .b.slate[Panel data] let us compare a unit to itself .b.purple[over time].

- .b.slate[Fixed effects] remove .b.orange[time-invariant omitted variables].

- `\(\implies\)` .b.slate[Identifying variation] is .b.purple[within variation].

- .b.slate[DiD] focuses on how trt-ctrl .b.slate[differences] change over time.

Panels can certainly help, but they still depend on strong assumptions.
